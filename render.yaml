services:
  - type: web
    name: openalex-mcp-app
    runtime: node
    plan: free
    nodeVersion: "20.18.0"
    buildCommand: npm install && npm run build
    startCommand: node dist/server/index.js
    envVars:
      - key: PORT
        value: "3000"
      - key: TRANSPORT
        value: http
      - key: OPENALEX_EMAIL
        sync: false
