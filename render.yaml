services:
  - type: web
    name: openalex-mcp-app
    runtime: node
    plan: free
    nodeVersion: "20.18.0"
    buildCommand: npm ci --include=dev && npm run build && ls -la dist/server/index.js
    startCommand: node dist/server/index.js
    envVars:
      - key: PORT
        value: "3000"
      - key: OPENALEX_EMAIL
        sync: false
